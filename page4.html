<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Musée sans fin</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
        }

        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: white;
            padding: 10px;
          
        }
    </style>
</head>

<body>

    <div id="info">
        ↑ ↓ : avancer / reculer<br>
        ← → : déplacer<br>
      
    </div>

    <script type="module">
        import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.170/build/three.module.js";

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xe6e6e6);

        // Caméra
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.7, 10);

        // Rendu
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lumière
        scene.add(new THREE.AmbientLight(0xffffff, 2));

        // Sol
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(30, 2000),
            new THREE.MeshBasicMaterial({ color: 0xd9d9d9 })
        );
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // Outils pour rendre l'image cliquable
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let panneauInteractif = null; // Contiendra le mesh cliquable

        // Chargeur de texture
        const textureLoader = new THREE.TextureLoader();
        const monImage = "1.png";

        let dernierZGenere = 0;
        const espacementZ = 12;
        let finCreee = false; 

        function creerCube(x, z, urlImage) {
            const groupe = new THREE.Group();

            const cube = new THREE.Mesh(
                new THREE.BoxGeometry(4, 4, 4),
                new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true })
            );
            groupe.add(cube);

            const texture = textureLoader.load(urlImage);
            const image = new THREE.Mesh(
                new THREE.PlaneGeometry(2.5, 2.5), 
                new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide })
            );
            
            image.position.z = 2.05; 
            groupe.add(image);

            groupe.position.set(x, 2, z);
            scene.add(groupe);
        }

        // Remplace l'ancienne porte par l'image 2.png cliquable
        function creerTableauFinal(z) {
            const groupeTableau = new THREE.Group();

            // Cadre extérieur blanc en fil de fer
            const cadre = new THREE.Mesh(
                new THREE.BoxGeometry(6, 6, 0.2),
                new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true })
            );
            groupeTableau.add(cadre);

            // Panneau affichant "2.png"
            const textureFinale = textureLoader.load("8.jpg");
            panneauInteractif = new THREE.Mesh(
                new THREE.PlaneGeometry(5.6, 5.6),
                new THREE.MeshBasicMaterial({ map: textureFinale, side: THREE.DoubleSide })
            );
            panneauInteractif.position.z = 0.11;
            groupeTableau.add(panneauInteractif);

            groupeTableau.position.set(0, 3, z);
            scene.add(groupeTableau);
        }

        function genererMuseeInfiniment(limiteZ) {
            if (limiteZ < -400) {
                limiteZ = -400;
                
                if (!finCreee) {
                    creerTableauFinal(-415); // Place le tableau final juste après les derniers cubes
                    finCreee = true;
                }
            }

            while (dernierZGenere > limiteZ) {
                creerCube(-5, dernierZGenere, monImage);
                creerCube(5, dernierZGenere, monImage);
                dernierZGenere -= espacementZ;
            }
        }

        // Génération initiale
        genererMuseeInfiniment(-120);

        // Événements de souris pour l'interaction avec 2.png
        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            if (panneauInteractif) {
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObject(panneauInteractif);
                // Si la souris survole l'image, le curseur devient une main
                document.body.style.cursor = intersects.length > 0 ? 'pointer' : 'default';
            }
        });

        window.addEventListener('click', () => {
            if (panneauInteractif) {
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObject(panneauInteractif);
                // Si on clique sur l'image, on est redirigé vers page2.html
                if (intersects.length > 0) {
                    window.location.href = "page2.html";
                }
            }
        });

        // Navigation
        const keys = {};
        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);

        function animate() {
            requestAnimationFrame(animate);

            if (keys['ArrowUp']) camera.position.z -= 0.12;
            if (keys['ArrowDown']) camera.position.z += 0.12;
            if (keys['ArrowLeft']) camera.position.x -= 0.08;
            if (keys['ArrowRight']) camera.position.x += 0.08;

            genererMuseeInfiniment(camera.position.z - 80);

            // Empêche la caméra de foncer et de traverser l'image finale
            if (camera.position.z < -408) {
                camera.position.z = -408;
            }

            floor.position.z = camera.position.z - 100;

            renderer.render(scene, camera);
        }
        animate();

        // Redimensionnement
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Musée sans fin</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
        }

        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: white;
        }

        /* compteur-z */
        #compteur-z {
            position: absolute;
            bottom: 20px;
            left: 95%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.75);
            color: rgb(0, 0, 0);
            font-family: monospace;
            font-size: 16px;
            font-weight: bold;
            z-index: 10;
            pointer-events: none; 
        }
    </style>
</head>

<body>

    <div id="info">
        ↑ ↓ : avancer / reculer<br>
        ← → : déplacer<br>
    </div>

    <div id="compteur-z">Z: 10</div>

    <script type="module">
        import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.170/build/three.module.js";

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xe6e6e6);

       
        const compteurZElement = document.getElementById('compteur-z');

        // Cam
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.7, 10);

        // Rendu
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Light
        scene.add(new THREE.AmbientLight(0xffffff, 2));

        // Sol
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(30, 2000),
            new THREE.MeshBasicMaterial({ color: 0xd9d9d9 })
        );
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let panneauInteractif = null; 

        // texture
        const textureLoader = new THREE.TextureLoader();
        const monImage = "1.png";

        let dernierZGenere = 0;
        const espacementZ = 12;
        let finCreee = false; 

        function creerCube(x, z, urlImage) {
            const groupe = new THREE.Group();

            const cube = new THREE.Mesh(
                new THREE.BoxGeometry(4, 4, 4),
                new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true })
            );
            groupe.add(cube);

            const texture = textureLoader.load(urlImage);
            const image = new THREE.Mesh(
                new THREE.PlaneGeometry(2.5, 2.5), 
                new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide })
            );
            
            image.position.z = 2.05; 
            groupe.add(image);

            groupe.position.set(x, 2, z);
            scene.add(groupe);
        }

        // 
        function creerTableauFinal(z) {
            const groupeTableau = new THREE.Group();
            const hauteurFixe = 5.6; // On fixe la hauteur maximale souhaitée dans le musée

            // Chargement de la texture avec une fonction de rappel (callback) pour obtenir les dimensions
            textureLoader.load("8.jpg", function(texture) {
                const imageSource = texture.image;
                
                // Calcul du ratio d'aspect (largeur / hauteur)
                const ratio = imageSource.width / imageSource.height;
                // La largeur s'adapte proportionnellement à la hauteur fixe définie
                const largeurAdaptee = hauteurFixe * ratio;

                // Création du cadre extérieur en fil de fer adapté au ratio
                const cadre = new THREE.Mesh(
                    new THREE.BoxGeometry(largeurAdaptee + 0.4, hauteurFixe + 0.4, 0.2),
                    new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true })
                );
                groupeTableau.add(cadre);

                // Création du panneau d'affichage respectant parfaitement le ratio
                panneauInteractif = new THREE.Mesh(
                    new THREE.PlaneGeometry(largeurAdaptee, hauteurFixe),
                    new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide })
                );
                panneauInteractif.position.z = 0.11;
                groupeTableau.add(panneauInteractif);
            });

            // Positionnement au centre du couloir
            groupeTableau.position.set(0, 3, z);
            scene.add(groupeTableau);
        }

        function genererMuseeInfiniment(limiteZ) {
            if (limiteZ < -300) {
                limiteZ = -300;
                
                if (!finCreee) {
                    creerTableauFinal(-315); 
                    finCreee = true;
                }
            }

            while (dernierZGenere > limiteZ) {
                creerCube(-5, dernierZGenere, monImage);
                creerCube(5, dernierZGenere, monImage);
                dernierZGenere -= espacementZ;
            }
        }

        // Génération initiale
        genererMuseeInfiniment(-120);

        // Événements de souris pour l'interaction avec 2.png
        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            if (panneauInteractif) {
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObject(panneauInteractif);
                document.body.style.cursor = intersects.length > 0 ? 'pointer' : 'default';
            }
        });

        window.addEventListener('click', () => {
            if (panneauInteractif) {
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObject(panneauInteractif);
                if (intersects.length > 0) {
                    window.location.href = "page2.html";
                }
            }
        });

        // Navigation
        const keys = {};
        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);

        function animate() {
            requestAnimationFrame(animate);

            if (keys['ArrowUp']) camera.position.z -= 0.12;
            if (keys['ArrowDown']) camera.position.z += 0.12;
            if (keys['ArrowLeft']) camera.position.x -= 0.08;
            if (keys['ArrowRight']) camera.position.x += 0.08;

            genererMuseeInfiniment(camera.position.z - 80);

            // Empêche la caméra de traverser le tableau final
            if (camera.position.z < -308) {
                camera.position.z = -308;
            }

            floor.position.z = camera.position.z - 100;

            // MISE À JOUR DU COMPTEUR EN BAS DE L'ÉCRAN
            // Math.floor permet d'avoir un affichage propre sans virgules
            compteurZElement.textContent = `Z : ${Math.floor(camera.position.z)}`;

            renderer.render(scene, camera);
        }
        animate();

        // Redimensionnement
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>

</body>
</html>
